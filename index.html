<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM Grill - POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header class="text-center py-5 bg-white border-bottom mb-4 shadow-sm">
        <h1 class="bpm-title mb-1">BPM GRILL</h1>
        <p class="bpm-subtitle">Beats Per Meal. The Ultimate Teppanyaki Rhythm POS.</p>
    </header>

    <div class="container mb-5 pos-container">
        <div class="row">
            <div class="col-md-8">
                <div class="p-4 bg-white border rounded shadow-sm h-100">
                    <h4 class="mb-4 section-heading">THE SETLIST (MENU AVAILABLE)</h4>
                    <div class="row row-cols-1 row-cols-md-4 g-3" id="menu-container">
                        </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="p-4 bg-white border rounded shadow-sm d-flex flex-column h-100">
                    <h4 class="mb-4 section-heading">CURRENT COMBO (ORDER)</h4>
                    
                    <div id="cart-items" class="flex-grow-1 overflow-auto mb-3">
                        </div>
                    
                    <div class="border-top pt-3">
                        <h3 class="mb-3 total-text">Total: <span id="total-price">0</span> PHP</h3>
                        <input type="number" id="payment-amount" class="form-control mb-3 p-2" placeholder="Enter the amount here">
                        <div class="d-flex justify-content-end">
                            <button id="pay-btn" class="btn btn-success px-5 py-2 fw-bold">Pay!</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
