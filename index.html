<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point of Sales System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container my-5 pos-container">
        <div class="row">
            <div class="col-md-8">
                <div class="p-3 bg-white border rounded shadow-sm h-100">
                    <h2 class="mb-4">Menu</h2>
                    <div class="row row-cols-1 row-cols-md-4 g-3" id="menu-container">
                        </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="p-3 bg-white border rounded shadow-sm d-flex flex-column h-100">
                    <h2 class="mb-4">Ordered Items</h2>
                    
                    <div id="cart-items" class="flex-grow-1 overflow-auto mb-3">
                        </div>
                    
                    <div class="border-top pt-3">
                        <h3 class="mb-3">Total: <span id="total-price">0</span> PHP</h3>
                        <input type="number" id="payment-amount" class="form-control mb-2" placeholder="Enter the amount here">
                        <div class="d-flex justify-content-end">
                            <button id="pay-btn" class="btn btn-success px-4">Pay!</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
